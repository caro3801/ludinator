<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ludinator Fest</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">Ludinator — Fest</span>
      <span class="text-secondary small">Édition 2024</span>
    </div>
  </nav>

  <div class="container">
    <div id="fest-alert" class="alert alert-danger" hidden></div>

    <ul class="nav nav-tabs mb-4" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-entries">Entrées</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-activities">Activités</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-slots">Créneaux</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-programme">Programme</button>
      </li>
    </ul>

    <div class="tab-content">

      <div id="tab-entries" class="tab-pane fade show active">
        <div class="row g-4">
          <div class="col-md-5">
            <div class="card">
              <div class="card-header">Compteur d'entrées</div>
              <div class="card-body">
                <fest-entry-counter></fest-entry-counter>
              </div>
            </div>
          </div>
          <div class="col-md-7">
            <div class="card">
              <div class="card-header">Fréquentation dans le temps</div>
              <div class="card-body">
                <fest-attendance-chart></fest-attendance-chart>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-activities" class="tab-pane fade">
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card">
              <div class="card-header">Créer une activité</div>
              <div class="card-body">
                <fest-activity-form></fest-activity-form>
              </div>
            </div>
          </div>
          <div class="col-md-8">
            <div class="card">
              <div class="card-header">Activités & inscriptions</div>
              <div class="card-body p-0">
                <fest-activity-list></fest-activity-list>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-slots" class="tab-pane fade">
        <div class="row g-4">
          <div class="col-md-5">
            <div class="card">
              <div class="card-header">Ajouter un créneau</div>
              <div class="card-body">
                <fest-add-slot-form></fest-add-slot-form>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-programme" class="tab-pane fade">
        <div class="row g-4">
          <div class="col-md-8">
            <div class="card">
              <div class="card-body">
                <fest-programme-view></fest-programme-view>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050; min-width: 300px;">
    <div class="card shadow">
      <div class="card-header">Inscrire une personne</div>
      <div class="card-body">
        <fest-entry-form hidden></fest-entry-form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/fest/fest.js"></script>
</body>
</html>
