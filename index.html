<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ludinator Crew</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">Ludinator — Crew</span>
      <span class="text-secondary small">Édition 2024</span>
    </div>
  </nav>

  <div class="container">
    <div id="crew-alert" class="alert alert-danger" hidden></div>

    <ul class="nav nav-tabs mb-4" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-volunteers">Bénévoles</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-posts">Postes</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-planning">Planning</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-stats">Statistiques</button>
      </li>
    </ul>

    <div class="tab-content">

      <div id="tab-volunteers" class="tab-pane fade show active">
        <div class="row g-4">
          <div class="col-md-5">
            <div class="card mb-3">
              <div class="card-header">Ajouter un bénévole</div>
              <div class="card-body">
                <crew-volunteer-form></crew-volunteer-form>
              </div>
            </div>
            <div class="card border-warning">
              <div class="card-header bg-warning-subtle">Renommer un bénévole</div>
              <div class="card-body">
                <crew-edit-volunteer-name-form></crew-edit-volunteer-name-form>
              </div>
            </div>
          </div>
          <div class="col-md-7">
            <div class="card">
              <div class="card-header">Bénévoles</div>
              <div class="card-body">
                <crew-volunteer-list></crew-volunteer-list>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-posts" class="tab-pane fade">
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card mb-3">
              <div class="card-header">Créer un poste</div>
              <div class="card-body">
                <crew-post-form></crew-post-form>
              </div>
            </div>
            <div class="card mb-3">
              <div class="card-header">Ajouter un créneau</div>
              <div class="card-body">
                <crew-add-slot-form></crew-add-slot-form>
              </div>
            </div>
            <div class="card border-warning">
              <div class="card-header bg-warning-subtle">Modifier un créneau</div>
              <div class="card-body">
                <crew-edit-slot-form></crew-edit-slot-form>
              </div>
            </div>
            <div class="card border-warning">
              <div class="card-header bg-warning-subtle">Renommer un poste</div>
              <div class="card-body">
                <crew-edit-post-name-form></crew-edit-post-name-form>
              </div>
            </div>
          </div>
          <div class="col-md-8">
            <div class="card">
              <div class="card-header">Postes & créneaux</div>
              <div class="card-body">
                <crew-post-list></crew-post-list>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-planning" class="tab-pane fade">
        <div class="row g-4">
          <div class="col-md-4">
            <div class="card">
              <div class="card-header">Affecter un bénévole</div>
              <div class="card-body">
                <crew-assign-form></crew-assign-form>
              </div>
            </div>
          </div>
          <div class="col-md-8">
            <div class="card">
              <div class="card-header">Planning</div>
              <div class="card-body">
                <crew-planning-view></crew-planning-view>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-stats" class="tab-pane fade">
        <div class="row g-4">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">Heures par bénévole</div>
              <div class="card-body p-0">
                <crew-stats-view></crew-stats-view>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/crew/crew.js"></script>
</body>
</html>
