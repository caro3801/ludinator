<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ludinator — Mioum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">Ludinator — Mioum</span>
      <span class="text-secondary small">Caisse enregistreuse</span>
    </div>
  </nav>

  <div class="container">
    <div id="mioum-alert" class="alert alert-danger" hidden></div>

    <ul class="nav nav-tabs mb-4" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-products">Produits</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-ticket">Ticket</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-stats">Statistiques</button>
      </li>
    </ul>

    <div class="tab-content">

      <div id="tab-products" class="tab-pane fade show active">
        <div class="row g-4">
          <div class="col-md-5">
            <div class="card">
              <div class="card-header">Ajouter un produit</div>
              <div class="card-body">
                <mioum-product-form></mioum-product-form>
              </div>
            </div>
          </div>
          <div class="col-md-7">
            <div class="card">
              <div class="card-header">Produits</div>
              <div class="card-body">
                <mioum-product-list></mioum-product-list>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="tab-ticket" class="tab-pane fade">
        <button id="btn-open-ticket" class="btn btn-success mb-3">Ouvrir un ticket</button>
        <mioum-ticket-view></mioum-ticket-view>
      </div>

      <div id="tab-stats" class="tab-pane fade">
        <mioum-stats-view></mioum-stats-view>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/mioum/mioum.js"></script>
</body>
</html>
